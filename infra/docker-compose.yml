version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      PTS_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/settlement
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: settlement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
